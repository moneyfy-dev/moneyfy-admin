name: Deploy Admin Moneyfy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Deploy to Admin
        run: |
          ssh -p 42877 -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_SERVER }} << 'EOF'
            set -e
            cd /var/www/admin/
            git config --global --add safe.directory /var/www/admin
            git pull origin master

            # Instalar dependencias y compilar assets
            npm ci
            export NODE_OPTIONS=--max-old-space-size=2048
            npm run build

            # Reiniciar Nginx para servir los nuevos archivos
            sudo systemctl restart nginx
          EOF
