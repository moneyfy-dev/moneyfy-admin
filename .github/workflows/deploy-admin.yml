name: Deploy Admin Moneyfy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build admin
        env:
          VITE_API_URL: https://api.moneyfy.cl/moneyfy
          VITE_USE_MOCKS: "false"
          VITE_DASHBOARD_USE_MOCKS: "false"
          VITE_COMMISSIONS_USE_MOCKS: "false"
          VITE_STATUS_UPDATES_ENABLED: "true"
          VITE_MONEYFY_API_KEY: ${{ secrets.MONEYFY_API_KEY }}
        run: npm run build

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Deploy to Admin
        run: |
          tar -czf admin-dist.tar.gz dist

          scp -P 42877 \
            -o StrictHostKeyChecking=no \
            admin-dist.tar.gz \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_SERVER }}:/tmp/admin-dist.tar.gz

          ssh -p 42877 \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=6 \
            -o TCPKeepAlive=yes \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_SERVER }} << 'EOF'
            set -euo pipefail
            cd /var/www/admin/
            git config --global --add safe.directory /var/www/admin
            git pull origin master

            rm -rf dist
            tar -xzf /tmp/admin-dist.tar.gz -C /var/www/admin
            rm -f /tmp/admin-dist.tar.gz

            # Reiniciar Nginx para servir los nuevos archivos
            sudo -n systemctl restart nginx
          EOF
